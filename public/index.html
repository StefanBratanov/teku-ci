<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teku CI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #2dd4bf;
  --accent-dim: rgba(45,212,191,.1);
  --success: #3fb950;
  --error: #f85149;
  --warning: #e3b341;
  --skipped: #6e7681;
  --blue: #58a6ff;
  --r: 6px;
  --mono: 'Cascadia Code','Fira Code','Consolas',monospace;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #0d1117; letter-spacing: -1px; }
.logo-text { font-size: 15px; font-weight: 700; }
.logo-text em { color: var(--accent); font-style: normal; }

.header-meta { display: flex; align-items: center; gap: 10px; margin-left: auto; font-size: 12px; color: var(--muted); }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
.spinner.lg { width: 32px; height: 32px; border-width: 3px; }
@keyframes spin { to { transform: rotate(360deg); } }

.refresh-btn {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: var(--r);
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
}
.refresh-btn:hover { color: var(--text); border-color: var(--muted); }
.refresh-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Filter bar ── */
#filter-bar {
  padding: 10px 24px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.tab { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; }
.tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ── PR List ── */
#pr-list { padding: 16px 24px 40px; max-width: 900px; }

.pr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .15s;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0 12px;
  align-items: start;
}
.pr-card:hover { border-color: var(--accent); }
.pr-card.status-failing  { border-left: 3px solid var(--error); }
.pr-card.status-building { border-left: 3px solid var(--blue); }
.pr-card.status-passing  { border-left: 3px solid var(--success); }
.pr-card.status-build_failed { border-left: 3px solid var(--warning); }
.pr-card.status-pending  { border-left: 3px solid var(--skipped); }

.pr-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
.pr-main { min-width: 0; }
.pr-title-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.pr-num { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.pr-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.pr-meta code { font-family: var(--mono); font-size: 11px; }
.pr-meta a { color: var(--blue); text-decoration: none; }
.pr-meta a:hover { text-decoration: underline; }
.pr-counts { font-size: 12px; margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
.pc-fail { color: var(--error); font-weight: 600; }
.pc-pass { color: var(--success); }
.pc-skip { color: var(--skipped); }
.pc-total { color: var(--muted); }

.pr-side { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge.failing     { background: rgba(248,81,73,.15); color: var(--error); }
.badge.passing     { background: rgba(63,185,80,.15); color: var(--success); }
.badge.building    { background: rgba(88,166,255,.1); color: var(--blue); }
.badge.build_failed{ background: rgba(227,179,65,.1); color: var(--warning); }
.badge.pending     { background: var(--surface-2); color: var(--muted); }
.badge.draft       { background: var(--surface-2); color: var(--muted); font-weight: 400; }
.pr-run-link { font-size: 11px; color: var(--blue); text-decoration: none; }
.pr-run-link:hover { text-decoration: underline; }

.pr-label { display: inline-flex; padding: 1px 7px; border-radius: 20px; font-size: 11px; border: 1px solid; }

.in-progress-jobs { margin-top: 4px; font-size: 11px; color: var(--blue); }


/* ── Init / empty states ── */
#init-screen { display: flex; flex-direction: column; align-items: center; padding: 80px 24px; gap: 14px; color: var(--muted); }
#empty-list { display: none; text-align: center; padding: 60px 24px; color: var(--muted); }

/* ── Detail view ── */
#detail-view { display: none; }

.back-bar {
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 54px;
  z-index: 90;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: var(--r);
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.back-btn:hover { color: var(--text); border-color: var(--muted); }
.back-pr-title { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Run info bar ── */
#run-bar {
  display: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 13px;
}
.run-name { font-weight: 600; }
.run-meta { display: flex; gap: 12px; color: var(--muted); flex-wrap: wrap; align-items: center; }
.run-meta code { font-family: var(--mono); font-size: 12px; }
.run-meta a { color: var(--blue); text-decoration: none; }
.run-meta a:hover { text-decoration: underline; }

/* ── Stats ── */
#stats-bar { display: none; padding: 14px 24px; gap: 10px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 18px; text-align: center; min-width: 82px; }
.stat .n { font-size: 26px; font-weight: 700; line-height: 1; }
.stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-top: 3px; }
.stat.s-fail .n { color: var(--error); }
.stat.s-pass .n { color: var(--success); }
.stat.s-skip .n { color: var(--skipped); }

/* ── Toolbar ── */
#toolbar { display: none; padding: 10px 24px; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.tabs { display: flex; gap: 4px; }
.search { flex: 1; max-width: 300px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); padding: 6px 10px; font-size: 13px; outline: none; }
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }
#expand-all { background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: var(--r); font-size: 12px; cursor: pointer; margin-left: auto; }
#expand-all:hover { color: var(--text); }

/* ── Detail loader ── */
#detail-loader { display: none; flex-direction: column; align-items: center; padding: 80px 24px; gap: 14px; color: var(--muted); }
#error-box { display: none; margin: 24px; padding: 14px 16px; background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.25); border-radius: var(--r); color: var(--error); font-size: 13px; }

/* ── Results ── */
main { padding: 16px 24px 40px; }

.group { margin-bottom: 20px; }
.group-hdr { display: flex; align-items: center; gap: 10px; padding: 8px 4px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
.group-hdr:hover .gtitle { color: var(--accent); }
.gchev { font-size: 10px; color: var(--muted); transition: transform .2s; }
.group-hdr.closed .gchev { transform: rotate(-90deg); }
.gtitle { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
.gpill { margin-left: auto; display: flex; gap: 10px; font-size: 12px; }
.gpill .gf { color: var(--error); font-weight: 600; }
.gpill .gt { color: var(--muted); }
.group-body.closed { display: none; }

.suite { border-bottom: 1px solid var(--border); }
.suite-hdr { display: flex; align-items: center; gap: 8px; padding: 7px 4px 7px 8px; cursor: pointer; user-select: none; }
.suite-hdr:hover { background: var(--surface); }
.schev { font-size: 9px; color: var(--muted); transition: transform .15s; flex-shrink: 0; }
.suite-hdr.closed .schev { transform: rotate(-90deg); }
.sname { font-family: var(--mono); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sname .pkg { opacity: .5; }
.scounts { flex-shrink: 0; display: flex; gap: 8px; font-size: 11px; }
.sc-f { color: var(--error); }
.sc-p { color: var(--success); }
.sc-t { color: var(--muted); }
.suite-cases.closed { display: none; }

.tc { border-left: 2px solid transparent; }
.tc.failed { border-left-color: var(--error); }
.tc.error  { border-left-color: var(--warning); }
.tc.skipped { border-left-color: var(--skipped); }

.tc-hdr { display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 18px; cursor: pointer; user-select: none; }
.tc-hdr:hover { background: var(--surface); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.failed .dot { background: var(--error); }
.error .dot  { background: var(--warning); }
.skipped .dot { background: var(--skipped); }
.passed .dot { background: var(--success); }
.tc-name { flex: 1; font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tc-dur { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.tc-arr { font-size: 9px; color: var(--muted); flex-shrink: 0; transition: transform .15s; }
.tc-hdr.open .tc-arr { transform: rotate(90deg); }

.tc-detail { display: none; padding: 6px 8px 10px 34px; border-top: 1px solid var(--border); background: var(--surface); }
.tc-detail.open { display: block; }

.fail-msg { font-family: var(--mono); font-size: 12px; color: var(--error); background: rgba(248,81,73,.07); border-radius: var(--r); padding: 8px 10px; margin-top: 6px; white-space: pre-wrap; word-break: break-word; }
.tc.error .fail-msg { color: var(--warning); background: rgba(227,179,65,.07); }

.stack-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 7px; color: var(--blue); font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; font-weight: 500; }
.stack-btn:hover { text-decoration: underline; }

.stack { display: none; margin-top: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; font-family: var(--mono); font-size: 11px; line-height: 1.65; color: var(--muted); white-space: pre-wrap; word-break: break-word; max-height: 380px; overflow-y: auto; }
.stack.open { display: block; }

.empty { text-align: center; padding: 60px 24px; color: var(--muted); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">T</div>
    <span class="logo-text">Teku <em>CI</em></span>
  </div>
  <div class="header-meta">
    <span id="refresh-text">Initializing...</span>
    <div id="refresh-spinner" class="spinner" style="display:none"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">Refresh</button>
  </div>
</header>

<!-- List view -->
<div id="list-view">
  <div id="filter-bar"></div>
  <div id="init-screen"><div class="spinner lg"></div><span>Loading PR data...</span></div>
  <div id="empty-list">No open PRs found.</div>
  <div id="pr-list"></div>
</div>

<!-- Detail view -->
<div id="detail-view">
  <div class="back-bar">
    <button class="back-btn" onclick="showList()">&#8592; PRs</button>
    <span class="back-pr-title" id="detail-back-title"></span>
  </div>
  <div id="run-bar"></div>
  <div id="stats-bar" style="display:none;flex-wrap:wrap;"></div>
  <div id="toolbar" style="display:none;"></div>
  <div id="detail-loader" style="display:none;flex-direction:column;align-items:center;padding:80px 24px;gap:14px;color:var(--muted);">
    <div class="spinner lg"></div><span>Loading test results...</span>
  </div>
  <div id="error-box"></div>
  <main id="results"></main>
</div>

<script>
let state = null;
let selectedPR = null;
let listFilter = 'all';
let testFilter = 'failed';
let search = '';
let pollTimer = null;

const $ = id => document.getElementById(id);

// ── Polling ─────────────────────────────────────────────────────────────────

async function fetchState() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) return;
    state = await res.json();
    onStateUpdate();
  } catch (e) {
    console.error('Poll error:', e.message);
  }
  schedulePoll();
}

function schedulePoll() {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(fetchState, 30_000);
}

function onStateUpdate() {
  updateHeader();
  if (selectedPR !== null) {
    const fresh = state.prs.find(p => p.number === selectedPR);
    if (fresh) renderDetail(fresh);
    else showList(); // PR was closed
  } else {
    renderList();
  }
}

async function triggerRefresh() {
  $('refresh-btn').disabled = true;
  try { await fetch('/api/refresh', { method: 'POST' }); } catch {}
  // Poll quickly to pick up the refreshing:true state
  clearTimeout(pollTimer);
  setTimeout(fetchState, 1000);
}

// ── Header ──────────────────────────────────────────────────────────────────

function updateHeader() {
  const spinner = $('refresh-spinner');
  const text = $('refresh-text');
  const btn = $('refresh-btn');

  spinner.style.display = state.refreshing ? 'block' : 'none';
  btn.disabled = state.refreshing;

  if (!state.initialized) {
    text.textContent = 'Initializing...';
    return;
  }

  const passing = state.prs.filter(p => p.status === 'passing').length;
  const count = state.prs.length - passing;
  const building = state.prs.filter(p => p.status === 'building').length;
  const failing = state.prs.filter(p => p.status === 'failing' || p.status === 'build_failed').length;

  let summary = `${count} active PR${count !== 1 ? 's' : ''}`;
  if (passing) summary += ` · ${passing} passing`;
  if (failing) summary += ` · ${failing} failing`;
  if (building) summary += ` · ${building} building`;
  if (state.lastRefresh) summary += ` · ${timeAgo(state.lastRefresh)}`;
  text.textContent = summary;
}

// ── List view ────────────────────────────────────────────────────────────────

function showList() {
  selectedPR = null;
  $('detail-view').style.display = 'none';
  $('list-view').style.display = 'block';
  renderList();
}

function renderList() {
  if (!state || !state.initialized) {
    $('init-screen').style.display = 'flex';
    $('empty-list').style.display = 'none';
    $('pr-list').innerHTML = '';
    $('filter-bar').innerHTML = '';
    return;
  }
  $('init-screen').style.display = 'none';

  const prs = state.prs;

  // Count by status for filter tabs
  const counts = { failing: 0, building: 0, build_failed: 0, pending: 0, passing: 0 };
  for (const p of prs) if (counts[p.status] !== undefined) counts[p.status]++;

  // Filter bar — "All" includes passing (passing cards are non-clickable)
  const filterDefs = [
    { key: 'all',          label: 'All',         count: prs.length },
    { key: 'failing',      label: 'Failing Tests', count: counts.failing },
    { key: 'building',     label: 'Building',    count: counts.building },
    { key: 'build_failed', label: 'Build Failed',count: counts.build_failed },
    { key: 'pending',      label: 'Pending',     count: counts.pending },
    { key: 'passing',      label: 'Passing',     count: counts.passing },
  ];
  $('filter-bar').innerHTML = filterDefs
    .filter(f => f.key === 'all' || f.count > 0)
    .map(f => `<button class="tab${listFilter === f.key ? ' active' : ''}" data-f="${f.key}">${f.label} <span style="opacity:.6">${f.count}</span></button>`)
    .join('');
  $('filter-bar').querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    listFilter = t.dataset.f;
    renderList();
  }));

  // Filter PRs — "all" includes passing; other tabs filter by status
  const filtered = listFilter === 'all' ? prs : prs.filter(p => p.status === listFilter);

  if (filtered.length === 0) {
    $('empty-list').style.display = 'block';
    $('empty-list').textContent = prs.length === 0 ? 'No open PRs found.' : 'No PRs match this filter.';
    $('pr-list').innerHTML = '';
    return;
  }
  $('empty-list').style.display = 'none';

  const list = $('pr-list');
  list.innerHTML = '';
  for (const pr of filtered) list.appendChild(buildPRCard(pr));
}

function buildPRCard(pr) {
  const stats = getPRStats(pr);
  const card = document.createElement('div');
  card.className = `pr-card status-${pr.status}`;
  if (pr.status !== 'passing') {
    card.addEventListener('click', () => selectPR(pr.number));
  } else {
    card.style.cursor = 'default';
  }

  const statusLabels = { failing: 'Failing Tests', passing: 'Passing', building: 'Building', build_failed: 'Build Failed', pending: 'Pending' };
  const badgeLabel = statusLabels[pr.status] || pr.status;

  let countsHtml = '';
  if (stats.total > 0) {
    countsHtml = `<div class="pr-counts">` +
      (stats.fail ? `<span class="pc-fail">&#x2715; ${stats.fail} failed</span>` : '') +
      (stats.pass ? `<span class="pc-pass">&#x2713; ${stats.pass} passed</span>` : '') +
      (stats.skip ? `<span class="pc-skip">${stats.skip} skipped</span>` : '') +
      `<span class="pc-total">${stats.total} total</span>` +
      `</div>`;
  }

  if (pr.status === 'building' && pr.inProgressJobs?.length) {
    countsHtml += `<div class="in-progress-jobs">Running: ${pr.inProgressJobs.slice(0, 3).map(esc).join(', ')}${pr.inProgressJobs.length > 3 ? ` +${pr.inProgressJobs.length - 3} more` : ''}</div>`;
  }

  if (pr.status === 'build_failed' && pr.jobs?.failedNonTest?.length) {
    const testsRan = pr.checkRunSuites?.length > 0 || pr.artifacts?.some(a => a.suites?.length > 0);
    const label = testsRan ? 'Failed (tests ran):' : 'Failed (no tests ran):';
    countsHtml += `<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">` +
      `<span style="font-size:11px;color:var(--muted)">${label}</span>` +
      pr.jobs.failedNonTest.map(n => `<span style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--error);padding:1px 8px;border-radius:4px;font-family:var(--mono);font-size:11px">${esc(n)}</span>`).join('') +
      `</div>`;
  }

  const labelsHtml = pr.labels?.length
    ? pr.labels.map(l => {
        const c = l.color ? `#${l.color}` : '#555';
        return `<span class="pr-label" style="color:${c};border-color:${c}33;background:${c}18">${esc(l.name)}</span>`;
      }).join('')
    : '';

  const runLink = pr.run?.html_url
    ? `<a class="pr-run-link" href="${esc(pr.run.html_url)}" target="_blank" onclick="event.stopPropagation()">Run #${pr.run.run_number} &#8599;</a>`
    : '';

  card.innerHTML = `
    <img class="pr-avatar" src="${esc(pr.authorAvatar)}" alt="${esc(pr.author)}" onerror="this.style.display='none'">
    <div class="pr-main">
      <div class="pr-title-row">
        <span class="pr-num">#${pr.number}</span>
        <span class="pr-title">${esc(pr.title)}</span>
        ${pr.isDraft ? '<span class="badge draft">Draft</span>' : ''}
        ${labelsHtml}
      </div>
      <div class="pr-meta">
        <span>by ${esc(pr.author)}</span>
        <code>${esc(pr.branch)}</code>
        <code>${esc(pr.headSha.slice(0,7))}</code>
        <span>${timeAgo(pr.updatedAt)}</span>
        ${runLink}
      </div>
      ${countsHtml}
    </div>
    <div class="pr-side">
      <span class="badge ${pr.status}">${badgeLabel}</span>
    </div>`;

  return card;
}

function getPRStats(pr) {
  let total = 0, fail = 0, pass = 0, skip = 0;
  function addSuite(suite) {
    if (suite.total !== undefined) {
      // Compact format: only failed/skipped in testcases; counts stored on suite
      fail  += (suite.testcases || []).filter(tc => tc.status === 'failed' || tc.status === 'error').length;
      total += suite.total;
      pass  += suite.passed  || 0;
      skip  += suite.skipped || 0;
    } else {
      for (const tc of (suite.testcases || [])) {
        total++;
        if (tc.status === 'failed' || tc.status === 'error') fail++;
        else if (tc.status === 'skipped') skip++;
        else pass++;
      }
    }
  }
  for (const art of (pr.artifacts || []))
    for (const suite of (art.suites || []))
      addSuite(suite);
  for (const suite of (pr.checkRunSuites || []))
    addSuite(suite);
  return { total, fail, pass, skip };
}

// ── Detail view ──────────────────────────────────────────────────────────────

function selectPR(number) {
  selectedPR = number;
  const pr = state.prs.find(p => p.number === number);
  if (!pr) return;
  $('list-view').style.display = 'none';
  $('detail-view').style.display = 'block';
  renderDetail(pr);
}

function renderDetail(pr) {
  $('detail-back-title').textContent = `#${pr.number} ${pr.title}`;

  testFilter = 'failed';
  search = '';

  const rb = $('run-bar');

  if (pr.status === 'pending') {
    rb.style.display = 'none';
    $('stats-bar').style.display = 'none';
    $('toolbar').style.display = 'none';
    $('error-box').style.display = 'none';
    $('results').innerHTML = `
      <div style="max-width:520px;margin:40px auto;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px">&#x23F3;</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">Waiting for CI</div>
        <div style="color:var(--muted);font-size:13px">No CI run has started for this PR yet.</div>
      </div>`;
    return;
  }

  // Run bar
  rb.style.display = 'flex';
  const statusLabels = { failing: 'Failing Tests', passing: 'Tests Passing', building: 'Building', build_failed: 'Build Failed', pending: 'Pending' };
  const badgeCls = { failing: 'failing', passing: 'passing', building: 'building', build_failed: 'build_failed', pending: 'pending' };
  rb.innerHTML = `
    <span class="run-name">#${pr.number} ${esc(pr.title)}</span>
    <span class="badge ${badgeCls[pr.status] || 'pending'}">${statusLabels[pr.status] || pr.status}</span>
    <div class="run-meta">
      <span>branch: <code>${esc(pr.branch)}</code></span>
      <span>commit: <code>${esc(pr.headSha.slice(0,7))}</code></span>
      <span>by ${esc(pr.author)}</span>
      ${pr.run?.html_url ? `<a href="${esc(pr.run.html_url)}" target="_blank">CI Run #${pr.run.run_number} &#8599;</a>` : ''}
      <a href="${esc(pr.url)}" target="_blank">PR on GitHub &#8599;</a>
    </div>`;

  if (pr.status === 'build_failed') {
    const nonTest = pr.jobs?.failedNonTest || pr.jobs?.failed || [];
    const hasTests = pr.checkRunSuites?.length > 0 || pr.artifacts?.some(a => a.suites?.length > 0);

    if (hasTests) {
      // Non-test job failed but tests ran — show a warning banner then test results
      $('error-box').style.display = 'block';
      $('error-box').style.cssText += ';background:rgba(227,179,65,.08);border-color:rgba(227,179,65,.25);color:var(--warning);';
      $('error-box').innerHTML = `Build job failed${nonTest.length ? ` (<strong>${nonTest.map(esc).join(', ')}</strong>)` : ''} but tests ran — results below.` +
        (pr.run?.html_url ? ` <a href="${esc(pr.run.html_url)}" target="_blank" style="color:var(--blue)">CI run &#8599;</a>` : '');
      renderTestResults({ artifacts: pr.artifacts || [], checkRunSuites: pr.checkRunSuites || [],
                          expiredArtifacts: pr.expiredArtifacts || 0, jobs: pr.jobs || {},
                          runUrl: pr.run?.html_url || null });
      return;
    }

    // No test data — tests never ran
    $('stats-bar').style.display = 'none';
    $('toolbar').style.display = 'none';
    $('error-box').style.display = 'none';
    $('results').innerHTML = `
      <div style="max-width:560px;margin:40px auto;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px">&#x1F3D7;&#xFE0F;</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">Build failed — tests did not run</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:16px">The following job(s) failed before tests could execute.</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px">
          ${nonTest.map(n => `<span style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--error);padding:3px 10px;border-radius:4px;font-family:var(--mono);font-size:12px">${esc(n)}</span>`).join('')}
        </div>
        ${pr.run?.html_url ? `<a href="${esc(pr.run.html_url)}" target="_blank" style="color:var(--blue);font-size:13px">View CI run on GitHub &#8599;</a>` : ''}
      </div>`;
    return;
  }

  if (pr.status === 'building') {
    const partial = pr.artifacts || [];
    const hasPartial = partial.some(a => a.suites?.length > 0);
    if (!hasPartial) {
      $('stats-bar').style.display = 'none';
      $('toolbar').style.display = 'none';
      $('error-box').style.display = 'none';
      const running = pr.inProgressJobs || [];
      $('results').innerHTML = `
        <div style="max-width:520px;margin:40px auto;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px">&#x23F3;</div>
          <div style="font-size:15px;font-weight:600;margin-bottom:8px">Build in progress</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:12px">Test artifacts are not available yet.</div>
          ${running.length ? `<div style="color:var(--blue);font-size:12px">Running: ${running.map(esc).join(', ')}</div>` : ''}
        </div>`;
      return;
    }
  }

  // Render immediately if data is already in state (Node.js path: pr.artifacts,
  // or Cloudflare expired-artifacts path: pr.checkRunSuites)
  const hasLocalData = pr.checkRunSuites?.length > 0 ||
                       pr.artifacts?.some(a => a.suites?.length > 0);
  if (hasLocalData) {
    renderTestResults({ artifacts: pr.artifacts || [], checkRunSuites: pr.checkRunSuites || [],
                        expiredArtifacts: pr.expiredArtifacts || 0, jobs: pr.jobs || {},
                        runUrl: pr.run?.html_url || null });
    return;
  }

  // No local data — fetch on-demand via /api/pr/:number (Cloudflare Worker path)
  $('stats-bar').style.display = 'none';
  $('toolbar').style.display = 'none';
  $('error-box').style.display = 'none';
  $('results').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:14px;color:var(--muted)">
      <div class="spinner lg"></div><span>Loading test results…</span>
    </div>`;
  loadPRTests(pr);
}

// ── On-demand test loading ───────────────────────────────────────────────────

async function loadPRTests(pr) {
  try {
    const res = await fetch(`/api/pr/${pr.number}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const testData = await res.json();
    if (testData.error) throw new Error(testData.error);
    if (selectedPR !== pr.number) return; // navigated away while fetching
    renderTestResults({ artifacts: testData.artifacts || [], checkRunSuites: testData.checkRunSuites || [],
                        expiredArtifacts: testData.expiredArtifacts || 0, jobs: pr.jobs || {},
                        runUrl: pr.run?.html_url || null });
  } catch (e) {
    if (selectedPR !== pr.number) return;
    $('results').innerHTML = `<div class="empty" style="color:var(--error)">Failed to load test results: ${esc(e.message)}</div>`;
  }
}

// ── Test results rendering ───────────────────────────────────────────────────

function renderTestResults(detailData) {
  let total = 0, fail = 0, skip = 0, pass = 0;
  function addSuiteStats(s) {
    if (s.total !== undefined) {
      fail  += (s.testcases || []).filter(tc => tc.status === 'failed' || tc.status === 'error').length;
      total += s.total;
      pass  += s.passed  || 0;
      skip  += s.skipped || 0;
    } else {
      for (const tc of (s.testcases || [])) {
        total++;
        if (tc.status === 'failed' || tc.status === 'error') fail++;
        else if (tc.status === 'skipped') skip++;
        else pass++;
      }
    }
  }
  for (const art of detailData.artifacts)
    for (const s of (art.suites || []))
      addSuiteStats(s);
  for (const suite of (detailData.checkRunSuites || []))
    addSuiteStats(suite);

  const sb = $('stats-bar');
  sb.style.display = 'flex';
  sb.innerHTML = `
    <div class="stat s-fail"><div class="n">${fail}</div><div class="l">Failures</div></div>
    <div class="stat s-pass"><div class="n">${pass}</div><div class="l">Passed</div></div>
    <div class="stat s-skip"><div class="n">${skip}</div><div class="l">Skipped</div></div>
    <div class="stat"><div class="n">${total}</div><div class="l">Total</div></div>`;

  const tb = $('toolbar');
  tb.style.display = 'flex';
  tb.innerHTML = `
    <div class="tabs">
      <button class="tab ${testFilter==='failed'?'active':''}" data-f="failed">Failed (${fail})</button>
      <button class="tab ${testFilter==='all'?'active':''}" data-f="all">All</button>
      <button class="tab ${testFilter==='skipped'?'active':''}" data-f="skipped">Skipped</button>
    </div>
    <input type="text" class="search" placeholder="Search tests..." id="search-box" value="${esc(search)}">
    <button id="expand-all">Expand all failures</button>`;

  tb.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    tb.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    testFilter = t.dataset.f;
    renderResultsInner(detailData);
  }));
  $('search-box').addEventListener('input', e => { search = e.target.value; renderResultsInner(detailData); });
  $('expand-all').addEventListener('click', expandAll);

  $('error-box').style.display = 'none';

  if (detailData.expiredArtifacts > 0 && detailData.checkRunSuites?.length > 0) {
    $('error-box').style.display = 'block';
    $('error-box').style.cssText += ';background:rgba(227,179,65,.08);border-color:rgba(227,179,65,.25);color:var(--warning);';
    $('error-box').innerHTML = 'Artifacts expired — results loaded from GitHub check run summaries. Stack traces may be limited.';
  }

  renderResultsInner(detailData);
}

function renderResultsInner(detailData) {
  const container = $('results');
  container.innerHTML = '';

  const groups = {};
  for (const art of (detailData.artifacts || [])) {
    const type = art.artifactName?.match(/^(unit|integration|acceptance|property|reference)/)?.[1] || 'other';
    (groups[type] = groups[type] || []).push(art);
  }
  for (const suite of (detailData.checkRunSuites || [])) {
    const type = suite.name?.match(/^(unit|integration|acceptance|property|reference)/i)?.[1]?.toLowerCase() || 'other';
    (groups[type] = groups[type] || []).push({ artifactName: suite.name, suites: [suite] });
  }

  const order = ['unit', 'integration', 'acceptance', 'property', 'reference', 'other'];
  const q = search.toLowerCase();
  let shown = 0;

  for (const type of order) {
    if (!groups[type]) continue;
    const el = buildGroup(type, groups[type], q);
    if (el) { container.appendChild(el); shown++; }
  }

  if (shown === 0) {
    const crSuites = (detailData.checkRunSuites || []).filter(s => s.total > 0);
    if (crSuites.length > 0 && testFilter === 'failed') {
      // All tests passed — nothing to show under "Failed" filter
      const totalPassed = crSuites.reduce((n, s) => n + (s.total || 0), 0);
      container.innerHTML = `<div class="empty" style="color:var(--success)">All ${totalPassed} tests passed.<br><span style="color:var(--muted);font-size:12px">Switch to <strong>All</strong> to see suite breakdown.</span></div>`;
    } else if (crSuites.length > 0) {
      // "All" filter — show suite-level summary (no individual test entries available from check-run)
      for (const suite of crSuites) {
        const f = (suite.testcases || []).filter(tc => tc.status === 'failed' || tc.status === 'error').length;
        const el = document.createElement('div');
        el.style.cssText = 'padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;';
        el.innerHTML = `<span style="color:var(--muted)">${esc(suite.name)}</span>` +
          `<span style="color:${f ? 'var(--error)' : 'var(--success)'}">` +
          (f ? `&#x2715; ${f} failed / ` : '') +
          `&#x2713; ${suite.total - f} passed</span>`;
        container.appendChild(el);
      }
    } else {
      const nonTest = detailData.jobs?.failedNonTest || [];
      if (nonTest.length > 0) {
        container.innerHTML = `
          <div style="max-width:560px;margin:40px auto;text-align:center;">
            <div style="font-size:36px;margin-bottom:12px">&#x1F3D7;&#xFE0F;</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:8px">Build step failed</div>
            <div style="color:var(--muted);font-size:13px;margin-bottom:16px">Tests ran successfully, but the following job(s) failed:</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px">
              ${nonTest.map(n => `<span style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--error);padding:3px 10px;border-radius:4px;font-family:var(--mono);font-size:12px">${esc(n)}</span>`).join('')}
            </div>
            ${detailData.runUrl ? `<a href="${esc(detailData.runUrl)}" target="_blank" style="color:var(--blue);font-size:13px">View CI run on GitHub &#8599;</a>` : ''}
          </div>`;
      } else {
        container.innerHTML = '<div class="empty">No tests match the current filter.</div>';
      }
    }
  }
}

function buildGroup(type, artifacts, q) {
  const suites = [];
  for (const art of artifacts)
    for (const s of (art.suites || [])) {
      const cases = filterCases(s.testcases || [], q);
      // Include suites with no matching testcases only on "all" filter when
      // the suite has data (compact format: passing tests are counts not entries)
      const summaryOnly = testFilter === 'all' && cases.length === 0 &&
                          (s.total > 0 || s.passed > 0) && !q;
      if (cases.length || summaryOnly) suites.push({ ...s, testcases: cases, summaryOnly });
    }
  if (!suites.length) return null;

  suites.sort((a, b) => fails(b.testcases) - fails(a.testcases));

  const total = suites.reduce((n, s) => n + s.testcases.length, 0);
  const f = suites.reduce((n, s) => n + fails(s.testcases), 0);
  const labels = { unit:'Unit Tests', integration:'Integration Tests', acceptance:'Acceptance Tests', property:'Property Tests', reference:'Reference Tests', other:'Other' };

  const wrap = document.createElement('div');
  wrap.className = 'group';

  const hdr = document.createElement('div');
  hdr.className = 'group-hdr';
  hdr.innerHTML = `<span class="gchev">&#x25BC;</span><span class="gtitle">${labels[type] || type}</span>
    <div class="gpill">${f ? `<span class="gf">&#x2691; ${f} failed</span>` : ''}<span class="gt">${total} shown</span></div>`;

  const body = document.createElement('div');
  body.className = 'group-body';
  hdr.addEventListener('click', () => { hdr.classList.toggle('closed'); body.classList.toggle('closed'); });

  for (const s of suites) body.appendChild(buildSuite(s));
  wrap.appendChild(hdr);
  wrap.appendChild(body);
  return wrap;
}

function buildSuite(suite) {
  const el = document.createElement('div');
  el.className = 'suite';

  // Compact/summary-only suite (all tests passed, no individual entries stored)
  if (suite.summaryOnly) {
    const p  = suite.passed  || 0;
    const sk = suite.skipped || 0;
    const row = document.createElement('div');
    row.className = 'suite-hdr';
    row.style.cursor = 'default';
    row.innerHTML = `<span class="sname" style="color:var(--muted)">${esc(suite.name)}</span>
      <div class="scounts">
        ${p  ? `<span class="sc-p">&#x2713; ${p} passed</span>` : ''}
        ${sk ? `<span class="sc-t">${sk} skipped</span>` : ''}
      </div>`;
    el.appendChild(row);
    return el;
  }

  const f = fails(suite.testcases);
  // Use precomputed counts from compact format; fall back to counting testcases
  const p  = suite.passed  !== undefined ? suite.passed  : suite.testcases.filter(t => t.status === 'passed').length;
  const sk = suite.skipped !== undefined ? suite.skipped : suite.testcases.filter(t => t.status === 'skipped').length;
  const parts = suite.name.split('.');
  const short = parts.pop();
  const pkg = parts.length ? parts.join('.') + '.' : '';

  const hdr = document.createElement('div');
  hdr.className = 'suite-hdr';
  hdr.innerHTML = `<span class="schev">&#x25BC;</span>
    <span class="sname"><span class="pkg">${esc(pkg)}</span>${esc(short)}</span>
    <div class="scounts">
      ${f  ? `<span class="sc-f">&#x2715; ${f}</span>` : ''}
      ${p  ? `<span class="sc-p">&#x2713; ${p}</span>` : ''}
      ${sk ? `<span class="sc-t">${sk} skipped</span>` : ''}
      ${suite.time ? `<span class="sc-t">${suite.time.toFixed(2)}s</span>` : ''}
    </div>`;

  const cases = document.createElement('div');
  cases.className = 'suite-cases';

  const sorted = [...suite.testcases].sort((a, b) =>
    ({failed:0,error:0,skipped:1,passed:2}[a.status]??3) - ({failed:0,error:0,skipped:1,passed:2}[b.status]??3));
  for (const tc of sorted) cases.appendChild(buildTC(tc));

  hdr.addEventListener('click', () => { hdr.classList.toggle('closed'); cases.classList.toggle('closed'); });
  el.appendChild(hdr);
  el.appendChild(cases);
  return el;
}

function buildTC(tc) {
  const el = document.createElement('div');
  el.className = `tc ${tc.status}`;
  const hasDetail = tc.failure && (tc.failure.message || tc.failure.detail);
  const dur = tc.time ? `${tc.time.toFixed(3)}s` : '';

  const hdr = document.createElement('div');
  hdr.className = 'tc-hdr';
  hdr.innerHTML = `<span class="dot"></span><span class="tc-name">${esc(tc.name)}</span>${dur ? `<span class="tc-dur">${dur}</span>` : ''}${hasDetail ? '<span class="tc-arr">&#x25BA;</span>' : ''}`;
  el.appendChild(hdr);

  if (hasDetail) {
    const msg = tc.failure.message?.trim() || '';
    const stack = tc.failure.detail?.trim() || '';
    const hasStack = stack && stack !== msg && stack.length > msg.length;

    const detail = document.createElement('div');
    detail.className = 'tc-detail';
    detail.innerHTML = `<div class="fail-msg">${esc(msg || stack)}</div>` +
      (hasStack ? `<button class="stack-btn" type="button">&#x25BA; Stack trace</button><pre class="stack">${esc(stack)}</pre>` : '');
    el.appendChild(detail);

    hdr.addEventListener('click', () => {
      const open = detail.classList.toggle('open');
      hdr.classList.toggle('open', open);
    });

    const btn = detail.querySelector('.stack-btn');
    const pre = detail.querySelector('.stack');
    if (btn && pre) btn.addEventListener('click', e => {
      e.stopPropagation();
      const v = pre.classList.toggle('open');
      btn.textContent = v ? '&#x25BC; Stack trace' : '&#x25BA; Stack trace';
    });

    if (tc.status === 'failed' || tc.status === 'error') {
      detail.classList.add('open');
      hdr.classList.add('open');
    }
  }
  return el;
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function filterCases(cases, q) {
  return cases.filter(tc => {
    if (testFilter === 'failed' && tc.status !== 'failed' && tc.status !== 'error') return false;
    if (testFilter === 'skipped' && tc.status !== 'skipped') return false;
    if (q && !tc.name.toLowerCase().includes(q) && !tc.classname.toLowerCase().includes(q)) return false;
    return true;
  });
}

function expandAll() {
  document.querySelectorAll('.tc.failed .tc-detail, .tc.error .tc-detail').forEach(d => {
    d.classList.add('open');
    d.previousElementSibling?.classList.add('open');
  });
  document.querySelectorAll('.suite-cases, .group-body').forEach(c => c.classList.remove('closed'));
  document.querySelectorAll('.suite-hdr, .group-hdr').forEach(h => h.classList.remove('closed'));
}

function fails(cases) { return cases.filter(t => t.status === 'failed' || t.status === 'error').length; }

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const s = Math.floor(ms / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}


// ── Boot ─────────────────────────────────────────────────────────────────────

fetchState();
</script>
